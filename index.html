<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>Sellizi — Buy & Sell Digital Products in Africa</title>
    <meta name="description" content="Sellizi is a digital marketplace for courses, accounts, digital downloads and services across Africa. Pay securely with Mobile Money." />
    <link rel="canonical" href="https://sellizi.app/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sellizi" />
    <meta property="og:title" content="Sellizi — Buy & Sell Digital Products in Africa" />
    <meta property="og:description" content="Digital marketplace for courses, accounts and downloads. Pay with Mobile Money across 16 African countries." />
    <meta property="og:image" content="https://sellizi.app/og-default.png" />
    <meta property="og:url" content="https://sellizi.app/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sellizi — Buy & Sell Digital Products in Africa" />
    <meta name="twitter:description" content="Digital marketplace for courses, accounts and downloads. Pay with Mobile Money." />
    <meta name="twitter:image" content="https://sellizi.app/og-default.png" />

    <!-- Google Search Console verification — replace with your token -->
    <meta name="google-site-verification" content="REPLACE_WITH_YOUR_VERIFICATION_TOKEN" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sellizi" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Organization structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Sellizi",
      "url": "https://sellizi.app",
      "logo": "https://sellizi.app/icons/icon-512.png",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
